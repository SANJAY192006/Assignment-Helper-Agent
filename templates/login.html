<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EduAssist AI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

    <!-- ── Animated Background ───────────────────────────────────── -->
    <div class="bg-particles" id="bgParticles" aria-hidden="true"></div>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <!-- ── Login Container ──────────────────────────────────────── -->
    <div class="container d-flex align-items-center justify-content-center min-vh-100 relative-container">
        <div class="login-card-wrap">
            <div class="login-card-inner">
                <!-- Logo -->
                <div class="text-center mb-4">
                    <div class="brand-logo-wrap mx-auto mb-3" style="width: 52px; height: 52px; font-size: 1.4rem;">
                        <i class="bi bi-mortarboard-fill"></i>
                    </div>
                    <h1 class="login-title">Welcome to EduAssist <span class="brand-ai">AI</span></h1>
                    <p class="login-subtitle">Sign in to start your interactive learning helper</p>
                </div>

                <!-- Form -->
                <form id="loginForm" method="POST" novalidate aria-label="Login form">
                    <div class="form-fields p-0">
                        <!-- Username -->
                        <div class="field-group mb-3">
                            <label for="usernameInput" class="field-label">
                                <i class="bi bi-person-fill" aria-hidden="true"></i> Username
                            </label>
                            <input type="text" class="form-control custom-input" id="usernameInput"
                                placeholder="Enter your username" required autocomplete="username">
                            <div class="invalid-feedback" role="alert">Please enter your username.</div>
                        </div>

                        <!-- Password -->
                        <div class="field-group mb-4">
                            <label for="passwordInput" class="field-label">
                                <i class="bi bi-lock-fill" aria-hidden="true"></i> Password
                            </label>
                            <input type="password" class="form-control custom-input" id="passwordInput"
                                placeholder="Enter your password" required autocomplete="current-password">
                            <div class="invalid-feedback" role="alert">Please enter your password.</div>
                        </div>

                        <!-- Error Message -->
                        <div class="alert alert-danger d-none py-2 px-3 mb-3 border-0 bg-danger-subtle text-danger" id="loginError" role="alert" style="border-radius:10px; font-size:0.82rem;">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span id="loginErrorText">Invalid username or password.</span>
                        </div>

                        <!-- Button -->
                        <button type="submit" class="btn btn-generate w-100" id="loginBtn">
                            <span class="btn-generate-inner">
                                <span>Sign In</span>
                                <i class="bi bi-arrow-right" aria-hidden="true"></i>
                            </span>
                            <span class="btn-shine" aria-hidden="true"></span>
                        </button>

                        <!-- Register link -->
                        <p class="text-center mt-3" style="font-size:0.85rem; color:var(--text-secondary);">
                            Don't have an account?
                            <a href="/register" style="color:var(--accent-light); font-weight:600; text-decoration:none;">Create one</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ── Toast Alert Notification ─────────────────────────────── -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:2100">
        <div id="copyToast" class="toast custom-toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-body d-flex align-items-center justify-content-between gap-3 py-3">
                <div class="d-flex align-items-center gap-2" id="toastMessageContainer">
                    <i class="bi bi-check-circle-fill fs-5" id="toastIcon" aria-hidden="true"></i>
                    <span class="fw-semibold" id="toastMessage">Logged in successfully!</span>
                </div>
                <button type="button" class="btn-close ms-auto" data-bs-dismiss="toast" aria-label="Close notification"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/script.js"></script>
</body>
</html>
